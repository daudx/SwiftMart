name: swiftmart_app
description: SwiftMart — Shop fast. Shop smart.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # ── UI ──────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts:    ^6.1.0

  # ── Networking ───────────────────────────────────────────────
  http: ^1.2.1

  # ── Firebase ─────────────────────────────────────────────────
  firebase_core:    ^3.6.0   # Must always be first Firebase package
  firebase_auth:    ^5.3.1   # Authentication
  cloud_firestore:  ^5.4.4   # Database
  firebase_storage: ^12.4.10
  image_picker: ^1.2.2
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1 # Add this line

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#071611"
    theme_color: "#071611"

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter-Black.ttf
          weight: 900